name: 'Publish Docker Image'

description: 'Build and publish a Docker image to GitHub Container Registry with shared metadata and caching.'

inputs:
  image_name:
    description: 'Image name without the ghcr.io/<owner>/ prefix.'
    required: true
  dockerfile:
    description: 'Path to the Dockerfile.'
    required: true
  tag:
    description: 'Optional explicit image tag.'
    required: false
    default: ''
  publish_latest:
    description: 'Whether to publish the latest tag.'
    required: false
    default: 'false'
  publish_sha_tag:
    description: 'Whether to publish a moving short-SHA tag.'
    required: false
    default: 'false'
  registry_username:
    description: 'Username for the target registry.'
    required: true
  registry_password:
    description: 'Password or token for the target registry.'
    required: true
  build_args:
    description: 'Optional multiline build args passed to docker/build-push-action.'
    required: false
    default: ''
  platforms:
    description: 'Comma-separated target platforms.'
    required: false
    default: 'linux/amd64'
  push:
    description: 'Whether to push the image.'
    required: false
    default: 'true'
  load:
    description: 'Whether to load the image into the local Docker daemon.'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Assemble tag rules
      id: tags
      shell: bash
      env:
        IMAGE_TAG: ${{ inputs.tag }}
        PUBLISH_LATEST: ${{ inputs.publish_latest }}
        PUBLISH_SHA_TAG: ${{ inputs.publish_sha_tag }}
      run: |
        TAG_RULES_FILE="$(mktemp)"

        if [[ -n "${IMAGE_TAG}" ]]; then
          echo "type=raw,value=${IMAGE_TAG}" >> "${TAG_RULES_FILE}"
        fi

        if [[ "${PUBLISH_LATEST}" == "true" ]]; then
          echo "type=raw,value=latest" >> "${TAG_RULES_FILE}"
        fi

        if [[ "${PUBLISH_SHA_TAG}" == "true" ]]; then
          echo "type=sha,format=short,prefix=,suffix=-{{date 'x'}}" >> "${TAG_RULES_FILE}"
        fi

        if [[ ! -s "${TAG_RULES_FILE}" ]]; then
          echo "At least one image tag rule must be configured."
          exit 1
        fi

        {
          echo "value<<EOF"
          cat "${TAG_RULES_FILE}"
          echo "EOF"
        } >> "${GITHUB_OUTPUT}"

    - name: Login to GitHub Container Registry
      uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
      with:
        registry: ghcr.io
        username: ${{ inputs.registry_username }}
        password: ${{ inputs.registry_password }}

    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f # v5.8.0
      env:
        DOCKER_METADATA_SHORT_SHA_LENGTH: 7
      with:
        images: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}
        tags: ${{ steps.tags.outputs.value }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

    - name: Build and push Docker image
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      with:
        context: .
        file: ${{ inputs.dockerfile }}
        platforms: ${{ inputs.platforms }}
        build-args: ${{ inputs.build_args }}
        push: ${{ inputs.push }}
        load: ${{ inputs.load }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:buildcache
        cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:buildcache,mode=max
