name: ci-release

on:
  workflow_call:
    inputs:
      tag:
        description: 'Git tag to release.'
        required: true
        type: string
      prerelease_name:
        description: 'Suffix for a manual pre-release (blank = full release)'
        required: false
        type: string
        default: ''
      skip_npm_publish:
        description: 'Skip publishing the verifier package to npm'
        required: false
        type: boolean
        default: true
      upload_prover_bundle:
        description: 'Upload the prover runtime bundle to the GitHub release'
        required: false
        type: boolean
        default: true
      push_docker_image:
        description: 'Push the prover Docker image to GHCR'
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to release.'
        required: true
        type: string
      prerelease_name:
        description: 'Suffix for a manual pre-release (blank = full release)'
        required: false
        type: string
        default: ''
      skip_npm_publish:
        description: 'Skip publishing the verifier package to npm'
        required: false
        type: boolean
        default: true
      upload_prover_bundle:
        description: 'Upload the prover runtime bundle to the GitHub release'
        required: false
        type: boolean
        default: true
      push_docker_image:
        description: 'Push the prover Docker image to GHCR'
        required: false
        type: boolean
        default: true

concurrency:
  group: release-${{ inputs.tag || github.run_id }}
  cancel-in-progress: false

defaults:
  run:
    shell: 'bash -ex {0}'

env:
  DOCKER_IMAGE_NAME: ethereum-prover

jobs:
  prepare-release:
    name: Sync release metadata
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Validate release tag
        env:
          TAG_NAME: ${{ inputs.tag }}
        run: |
          if [[ -z "${TAG_NAME}" ]]; then
            echo "Release tag is required."
            exit 1
          fi

          if [[ ! "${TAG_NAME}" =~ ^[A-Za-z0-9.-]+$ ]]; then
            echo "Release tag '${TAG_NAME}' contains unsupported characters."
            echo "Only alphanumeric characters, dots, and dashes are allowed."
            exit 1
          fi

      - name: Update release-please release artifacts
        if: ${{ inputs.prerelease_name == '' }}
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ inputs.tag }}

      - name: Update manual pre-release metadata
        if: ${{ inputs.prerelease_name != '' }}
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ inputs.tag }}
          name: ethereum-prover ${{ inputs.tag }}${{ inputs.prerelease_name && format(' {0}', inputs.prerelease_name) || '' }}
          target_commitish: ${{ github.sha }}
          prerelease: true

  publish-verifier:
    name: Publish verifier to npm
    runs-on: ubuntu-latest
    needs:
      - prepare-release
    if: ${{ !inputs.skip_npm_publish }}
    permissions:
      contents: read
      id-token: write  # Required for npm OIDC trusted publishing
    defaults:
      run:
        working-directory: ./proof_verifier_js/ts

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: ${{ inputs.tag }}

      - name: Install Rust toolchain
        uses: moonrepo/setup-rust@ede6de059f8046a5e236c94046823e2af11ca670 # v1.2.2
        with:
          inherit-toolchain: true

      - uses: taiki-e/install-action@3522286d40783523f9c7880e33f785905b4c20d0 # v2.66.1
        with:
          tool: wasm-pack


      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'

      - uses: mskelton/setup-yarn@8d0bc12bc7f72a9acfc32019da0381dfcb481df0 # v3.0.0

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@11.7.0

      - name: Install deps
        run: yarn install

      - name: Build
        run: yarn build

      - name: Publish to npm
        run: npm publish --access public --tag latest --provenance

  release-prover-image:
    name: Build prover Docker image
    runs-on: matterlabs-ci-runner-high-performance
    needs:
      - prepare-release
    if: ${{ inputs.push_docker_image || inputs.upload_prover_bundle }}
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout sources
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: ${{ inputs.tag }}

      - name: Build and push Docker image
        uses: ./.github/actions/publish-docker-image
        with:
          image_name: ${{ env.DOCKER_IMAGE_NAME }}
          dockerfile: docker/ethereum-prover/Dockerfile
          tag: ${{ inputs.tag }}
          registry_username: ${{ github.actor }}
          registry_password: ${{ secrets.GITHUB_TOKEN }}
          push: ${{ inputs.push_docker_image }}
          load: ${{ inputs.upload_prover_bundle }}

      - name: Export runtime bundle
        if: ${{ inputs.upload_prover_bundle }}
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE_NAME }}:${{ inputs.tag }}
          TAG_NAME: ${{ inputs.tag }}
        run: |
          CONTAINER_ID=$(docker create "${IMAGE_NAME}")
          trap 'docker rm -f "${CONTAINER_ID}"' EXIT

          mkdir -p release
          docker cp "${CONTAINER_ID}:/opt/ethereum-prover/." ./release

          ARCHIVE_NAME="ethereum_prover-${TAG_NAME}-x86_64-unknown-linux-gnu-gpu.tar.gz"
          tar -C release -czf "${ARCHIVE_NAME}" .
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "${GITHUB_ENV}"

      - name: Attach runtime bundle to release
        if: ${{ inputs.upload_prover_bundle }}
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ inputs.tag }}
          files: ${{ env.ARCHIVE_NAME }}
