name: ci-run

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

env:
  PROVER_GPU_TESTS: prover-gpu-tests

jobs:
  general-checks:
    name: general-checks 🧹
    runs-on: matterlabs-ci-runner-high-performance
    defaults:
      run:
        working-directory: ./proof_verifier_js/ts

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install Rust toolchain
        uses: moonrepo/setup-rust@ede6de059f8046a5e236c94046823e2af11ca670 # v1.2.2
        with:
          inherit-toolchain: true

      - uses: taiki-e/install-action@3522286d40783523f9c7880e33f785905b4c20d0 # v2.66.1
        with:
          tool: wasm-pack

      - name: Setup Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: '22'

      - uses: mskelton/setup-yarn@8d0bc12bc7f72a9acfc32019da0381dfcb481df0 # v3.0.0

      - name: Install deps
        run: yarn install

      - name: Build
        run: yarn build

  license-check:
    name: license-check 📜
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./proof_verifier_js/ts

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
        with:
          node-version: '22'

      - name: Install license-checker
        run: npm install -g license-checker

      - name: Run license checker
        run: |
          license-checker --production \
            --onlyAllow "MIT;Apache-2.0" \
            --summary

  ethereum-prover-checks:
    name: ethereum-prover checks 🧪
    runs-on: matterlabs-ci-runner-high-performance
    env:
      ZKSYNC_USE_CUDA_STUBS: true
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup runner
        uses: ./.github/actions/runner-setup

      - name: Rustfmt
        run: cargo fmt -p ethereum_prover -- --check

      # TODO: For some reason, it takes forever to run.
      # - name: Clippy
      #   run: cargo clippy -p ethereum_prover --no-deps -- -D warnings

      - name: Tests (nextest)
        run: RUST_MIN_STACK=267108864 cargo nextest run -p ethereum_prover --release

  ##########################################
  #  Build prover integration tests archive #
  ##########################################
  build-prover-tests:
    name: build prover tests 📦
    runs-on: matterlabs-ci-runner-high-performance
    container:
      image: nvidia/cuda:12.9.1-devel-ubuntu22.04
    env:
      # The build container has no attached GPU, so the CUDA build must not rely
      # on `native` architecture detection. Keep this aligned with the GPU CI
      # runner fleet, following the working zksync-airbender setup.
      CUDAARCHS: '80;89;90'
      RUST_MIN_STACK: 267108864
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup runner
        uses: ./.github/actions/runner-setup

      - name: Check CUDA version
        run: nvcc --version

      - name: Build and archive tests
        run: cargo nextest archive --release -p ethereum_prover --test integration --archive-file "${PROVER_GPU_TESTS}.tar.zst"

      - name: Upload tests
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ env.PROVER_GPU_TESTS }}
          path: ${{ env.PROVER_GPU_TESTS }}.tar.zst
          if-no-files-found: error
          retention-days: 1

  ######################################
  #  Run prover integration tests GPU  #
  ######################################
  ethereum-prover-gpu-tests:
    name: ethereum-prover gpu tests 🖥️
    runs-on: matterlabs-ci-gpu-runner
    needs: build-prover-tests
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup runner
        uses: ./.github/actions/runner-setup

      - name: Download prebuilt tests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.PROVER_GPU_TESTS }}
          path: .

      - name: Run prover tests on GPU
        env:
          RUN_GPU_TESTS: '1'
          RUST_MIN_STACK: 267108864
        run: cargo nextest run --archive-file "${PROVER_GPU_TESTS}.tar.zst" --workspace-remap "${GITHUB_WORKSPACE}"

  # Special job that allows some of the jobs to be skipped or failed
  # requiring others to be successful
  pr-checks:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - general-checks
      - ethereum-prover-checks
      - build-prover-tests
      - ethereum-prover-gpu-tests
    steps:
      - name: Decide on PR checks
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
